apiVersion: v1
kind: Secret
metadata:
  name: aks-spring-demo-secrets
  namespace: aks-demo
  labels:
    app.kubernetes.io/name: aks-spring-demo
    app.kubernetes.io/component: auth
type: Opaque
# stringData is base64-encoded automatically by Kubernetes on apply.
# In production, provision this secret via Azure Key Vault + AKS Secret Store CSI driver
# instead of storing credentials in source control.
stringData:
  USER_SERVICE_API_KEY: "demo-api-key-change-in-production"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-spring-demo
  namespace: aks-demo
  labels:
    app: aks-spring-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aks-spring-demo
  template:
    metadata:
      labels:
        app: aks-spring-demo
    spec:
      containers:
        - name: app
          image: aks-spring-demo:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Non-sensitive config from ConfigMap
            - name: APP_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: aks-spring-demo-config
                  key: APP_MESSAGE
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: aks-spring-demo-config
                  key: USER_SERVICE_URL
            # Sensitive credentials from Secret
            - name: USER_SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aks-spring-demo-secrets
                  key: USER_SERVICE_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

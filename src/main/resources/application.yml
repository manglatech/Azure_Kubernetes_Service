server:
  port: 8080

spring:
  application:
    name: aks-spring-demo

app:
  message: ${APP_MESSAGE:Hello from Spring Boot on Azure Kubernetes Service - Dhaval}

user:
  service:
    url: ${USER_SERVICE_URL:http://localhost:8081}
    api-key: ${USER_SERVICE_API_KEY:dev-api-key-not-for-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
